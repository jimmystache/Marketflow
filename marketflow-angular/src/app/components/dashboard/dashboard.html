<div class="dashboard-container">
  <h1>Dashboard</h1>
  <p>Welcome to your Marketflow dashboard. You have successfully logged in.</p>

  <div *ngIf="orders">
    <h2>Orders for Selected Session</h2>
    <pre style="max-width:100%;overflow:auto;background:#f3f3f3;padding:1em;border-radius:8px;">
      {{ orders | json }}
    </pre>
  </div>
</div>
