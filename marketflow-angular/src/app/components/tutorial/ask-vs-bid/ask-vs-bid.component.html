<section>
  <h2>Bid vs Ask</h2>
  <ul>
    <li>Bid = highest price buyers will pay.</li>
    <li>Ask = lowest price sellers will accept.</li>
    <li>Profit comes from buying at the ask and selling at the bid.</li>
  </ul>
  <p><strong>Example:</strong> If bid = 101 and ask = 100, buying at 100 and selling at 101 = $1 gain.</p>
</section>
