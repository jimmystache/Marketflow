<section>
  <h2>Trade History</h2>
  <ul>
    <li>Trades hitting the bid = selling pressure.</li>
    <li>Trades hitting the ask = buying pressure.</li>
    <li>Fast trade flow = momentum.</li>
  </ul>
  <p><strong>Example:</strong> Five trades in a row at the ask usually means buyers are aggressive.</p>
</section>
