<section>
  <h2>Spotting Good Trades</h2>
  <ul>
    <li>Spread capture: buy low ask, sell high bid.</li>
    <li>Momentum check: repeated trades at the ask show buyer strength.</li>
    <li>Liquidity awareness: thin books cause slippage.</li>
  </ul>
  <p><strong>Example:</strong> If depth is low, even a small order can move price.</p>
</section>
