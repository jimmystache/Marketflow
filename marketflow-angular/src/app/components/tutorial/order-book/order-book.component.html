<section>
  <h2>Order Book</h2>
  <ul>
    <li>Depth = how many units are available at each price.</li>
    <li>Imbalance = more buyers than sellers or vice versa.</li>
    <li>Walls = large orders that act like temporary support/resistance.</li>
  </ul>
  <p><strong>Example:</strong> A huge buy wall at 99.50 often keeps price above that level.</p>
</section>
